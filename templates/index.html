<!DOCTYPE html>
<html>
<head>
<title>Price Comparison</title>
</head>

<body>

<h2>Product Price Comparison</h2>

<form method="POST">
<input type="text" name="product" placeholder="Enter product name">
<button type="submit">Search</button>
</form>

{% if result %}
<h3>Amazon Price: {{result.amazon}}</h3>
<h3>Flipkart Price: {{result.flipkart}}</h3>
{% endif %}

</body>
</html>
